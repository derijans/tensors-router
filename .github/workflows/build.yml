name: Build executables

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install WebUI dependencies
        working-directory: webui
        run: npm ci

      - name: Check WebUI
        working-directory: webui
        run: npm run check

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            binary: tensors-router-linux-amd64
            webui_binary: tensor-router-webui-linux-amd64
            archive: tensors-router-linux-amd64.tar.gz
          - name: linux-arm64
            goos: linux
            goarch: arm64
            binary: tensors-router-linux-arm64
            webui_binary: tensor-router-webui-linux-arm64
            archive: tensors-router-linux-arm64.tar.gz
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            binary: tensors-router-linux-armv7
            webui_binary: tensor-router-webui-linux-armv7
            archive: tensors-router-linux-armv7.tar.gz
          - name: windows-amd64
            goos: windows
            goarch: amd64
            binary: tensors-router-windows-amd64.exe
            webui_binary: tensor-router-webui-windows-amd64.exe
            archive: tensors-router-windows-amd64.zip
          - name: windows-arm64
            goos: windows
            goarch: arm64
            binary: tensors-router-windows-arm64.exe
            webui_binary: tensor-router-webui-windows-arm64.exe
            archive: tensors-router-windows-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install WebUI dependencies
        working-directory: webui
        run: npm ci

      - name: Build WebUI assets
        working-directory: webui
        run: npm run build

      - name: Build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
          TARGET_GOARM: ${{ matrix.target.goarm }}
          OUTPUT: dist/${{ matrix.target.binary }}
          WEBUI_OUTPUT: dist/${{ matrix.target.webui_binary }}
        run: |
          mkdir -p dist
          if [ -n "$TARGET_GOARM" ]; then
            export GOARM="$TARGET_GOARM"
          fi
          go build -buildvcs=false -trimpath -ldflags "-s -w" -o "$OUTPUT" ./cmd/tensors-router
          go build -buildvcs=false -trimpath -ldflags "-s -w" -o "$WEBUI_OUTPUT" ./cmd/tensor-router-webui

      - name: Package
        env:
          GOOS: ${{ matrix.target.goos }}
          BINARY: ${{ matrix.target.binary }}
          WEBUI_BINARY: ${{ matrix.target.webui_binary }}
          ARCHIVE: ${{ matrix.target.archive }}
        run: |
          chmod +x "dist/$BINARY"
          chmod +x "dist/$WEBUI_BINARY"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip "$ARCHIVE" "$BINARY" "$WEBUI_BINARY")
          else
            (cd dist && tar -czf "$ARCHIVE" "$BINARY" "$WEBUI_BINARY")
          fi
          sha256sum "dist/$BINARY" > "dist/$BINARY.sha256"
          sha256sum "dist/$WEBUI_BINARY" > "dist/$WEBUI_BINARY.sha256"
          sha256sum "dist/$ARCHIVE" > "dist/$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tensors-router-${{ matrix.target.name }}
          path: |
            dist/${{ matrix.target.binary }}
            dist/${{ matrix.target.binary }}.sha256
            dist/${{ matrix.target.webui_binary }}
            dist/${{ matrix.target.webui_binary }}.sha256
            dist/${{ matrix.target.archive }}
            dist/${{ matrix.target.archive }}.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: tensors-router-*
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          TAG_NAME="$RELEASE_TAG_NAME"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/* --clobber
          else
            gh release create "$TAG_NAME" release/* --generate-notes --title "$TAG_NAME" --target "$GITHUB_SHA"
          fi

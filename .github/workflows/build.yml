name: Build executables

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            binary: tensors-router-linux-amd64
            archive: tensors-router-linux-amd64.tar.gz
          - name: windows-amd64
            goos: windows
            goarch: amd64
            binary: tensors-router-windows-amd64.exe
            archive: tensors-router-windows-amd64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
          OUTPUT: dist/${{ matrix.target.binary }}
        run: |
          mkdir -p dist
          go build -buildvcs=false -trimpath -ldflags "-s -w" -o "$OUTPUT" ./cmd/tensors-router

      - name: Package
        env:
          GOOS: ${{ matrix.target.goos }}
          BINARY: ${{ matrix.target.binary }}
          ARCHIVE: ${{ matrix.target.archive }}
        run: |
          chmod +x "dist/$BINARY"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip "$ARCHIVE" "$BINARY")
          else
            (cd dist && tar -czf "$ARCHIVE" "$BINARY")
          fi
          sha256sum "dist/$ARCHIVE" > "dist/$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tensors-router-${{ matrix.target.name }}
          path: |
            dist/${{ matrix.target.archive }}
            dist/${{ matrix.target.archive }}.sha256
          if-no-files-found: error
          retention-days: 14

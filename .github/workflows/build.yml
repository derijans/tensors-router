name: Build executables

on:
  push:
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            binary: tensors-router-linux-amd64
            archive: tensors-router-linux-amd64.tar.gz
          - name: windows-amd64
            goos: windows
            goarch: amd64
            binary: tensors-router-windows-amd64.exe
            archive: tensors-router-windows-amd64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: 0
          OUTPUT: dist/${{ matrix.target.binary }}
        run: |
          mkdir -p dist
          go build -buildvcs=false -trimpath -ldflags "-s -w" -o "$OUTPUT" ./cmd/tensors-router

      - name: Package
        env:
          GOOS: ${{ matrix.target.goos }}
          BINARY: ${{ matrix.target.binary }}
          ARCHIVE: ${{ matrix.target.archive }}
        run: |
          chmod +x "dist/$BINARY"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip "$ARCHIVE" "$BINARY")
          else
            (cd dist && tar -czf "$ARCHIVE" "$BINARY")
          fi
          sha256sum "dist/$BINARY" > "dist/$BINARY.sha256"
          sha256sum "dist/$ARCHIVE" > "dist/$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tensors-router-${{ matrix.target.name }}
          path: |
            dist/${{ matrix.target.binary }}
            dist/${{ matrix.target.binary }}.sha256
            dist/${{ matrix.target.archive }}
            dist/${{ matrix.target.archive }}.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: tensors-router-*
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/* --clobber
          else
            gh release create "$TAG_NAME" release/* --generate-notes --title "$TAG_NAME"
          fi
